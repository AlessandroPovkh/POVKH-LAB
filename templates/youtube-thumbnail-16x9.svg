  <text data-critical="true" x="64" y="108" fill="#F32222" class="meta" font-size="20">PROCESS / 001</text>
  <text data-critical="true" x="64" y="405" fill="#F2EFE7" class="display" font-size="260" textLength="608" lengthAdjust="spacingAndGlyphs">ARTIST</text>
  <rect x="64" y="438" width="608" height="20" fill="#F32222"/>
  <text data-critical="true" x="64" y="575" fill="#F2EFE7" class="display" font-size="135" textLength="520" lengthAdjust="spacingAndGlyphs">ONE SOUND</text>
