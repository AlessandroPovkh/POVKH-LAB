<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc" data-template-version="1.0" data-safe-inset="64">
  <title id="title">POVKH LAB YouTube thumbnail template</title>
  <desc id="desc">Legacy-compatible 1280 by 720 sample delivery derivative template, visibly marked not for publication. Build campaign masters at 3840 by 2160, then downsample when required. Critical typography stays inside a 64-pixel safe inset and clear of the lower-right duration badge area.</desc>
  <style>
    @font-face { font-family: Barlow; src: url("../assets/fonts/BarlowCondensed-Black.ttf") format("truetype"); font-style: normal; font-weight: 900; font-display: swap; }
    @font-face { font-family: Plex; src: url("../assets/fonts/IBMPlexMono-Regular.ttf") format("truetype"); font-style: normal; font-weight: 400; font-display: swap; }
    .display { font-family: Barlow, "Arial Narrow", sans-serif; font-weight: 900; font-synthesis: none; }
    .meta { font-family: Plex, monospace; font-weight: 400; font-synthesis: none; letter-spacing: .08em; }
  </style>
  <rect width="1280" height="720" fill="#080808"/>
  <rect x="720" width="560" height="720" fill="#202020"/>
